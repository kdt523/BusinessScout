name: bizideas_flutter
description: A real-time multi-agent business scouting and feasibility app.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.0
  google_fonts: ^6.1.0
  url_launcher: 6.1.11
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  pdfx: ^2.7.0
  shared_preferences: ^2.3.4
  webview_flutter: ^4.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

dependency_overrides:
  url_launcher: 6.1.11
  url_launcher_ios: 6.1.4
  path_provider_foundation: 2.4.0
